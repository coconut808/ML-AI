<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password — Someprototype Wiki</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* ── Global resets ── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            font-family: 'IBM Plex Sans', sans-serif;
            background: #0d1117;
            color: #e6edf3;
            min-height: 100vh;
        }

        /* ── Page wrapper ── */
        .block-container {
            padding-top: 0;
            padding-bottom: 3rem;
            padding-left: clamp(1rem, 6vw, 6rem);
            padding-right: clamp(1rem, 6vw, 6rem);
            max-width: 1280px;
            margin-left: auto;
            margin-right: auto;
        }

        /* ── Banner / Header ── */
        .wiki-banner {
            background: linear-gradient(135deg, #0d1117 0%, #161b22 40%, #0d1523 100%);
            border-bottom: 1px solid #21262d;
            border-radius: 0 0 12px 12px;
            padding: clamp(1.5rem, 4vw, 2.5rem) clamp(1.25rem, 4vw, 2.5rem) clamp(1.25rem, 3vw, 1.75rem);
            margin: 0 0 2rem 0;
            position: relative;
            overflow: hidden;
        }

        .wiki-banner::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse 60% 80% at 80% 50%, rgba(88, 166, 255, 0.07) 0%, transparent 70%),
                radial-gradient(ellipse 40% 60% at 20% 80%, rgba(63, 185, 80, 0.05) 0%, transparent 60%);
            pointer-events: none;
        }

        .wiki-banner::after {
            content: '{ }';
            position: absolute;
            right: clamp(1rem, 4vw, 2.5rem);
            top: 50%;
            transform: translateY(-50%);
            font-family: 'IBM Plex Mono', monospace;
            font-size: clamp(2.5rem, 6vw, 5rem);
            font-weight: 600;
            color: rgba(88, 166, 255, 0.06);
            letter-spacing: -0.05em;
            pointer-events: none;
        }

        .banner-eyebrow {
            font-family: 'IBM Plex Mono', monospace;
            font-size: clamp(0.55rem, 1.2vw, 0.65rem);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #3fb950;
            margin-bottom: 0.6rem;
        }

        .banner-title {
            font-family: 'IBM Plex Sans', sans-serif;
            font-size: clamp(1.5rem, 4vw, 2.25rem);
            font-weight: 700;
            color: #e6edf3;
            letter-spacing: -0.02em;
            line-height: 1.15;
            margin-bottom: 0.5rem;
        }

        .banner-title span { color: #58a6ff; }

        .banner-subtitle {
            font-size: clamp(0.8rem, 1.8vw, 0.9rem);
            font-weight: 300;
            color: #8b949e;
            max-width: 540px;
            line-height: 1.6;
        }

        /* ── Nav back link ── */
        .nav-back {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.7rem;
            letter-spacing: 0.08em;
            color: #58a6ff;
            text-decoration: none;
            margin-bottom: 1.5rem;
            opacity: 0.8;
            transition: opacity 0.2s;
        }

        .nav-back:hover { opacity: 1; }

        /* ── Section heading ── */
        .section-heading {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.65rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: #484f58;
            margin-bottom: 0.75rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #21262d;
        }

        /* ── Content placeholder ── */
        .content-placeholder {
            background: #161b22;
            border: 1px dashed #30363d;
            border-radius: 10px;
            padding: clamp(2rem, 5vw, 3rem) clamp(1.5rem, 4vw, 2.5rem);
            margin-top: 0.5rem;
            min-height: 240px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: flex-start;
            gap: 0.75rem;
        }

        .placeholder-label {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.65rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #30363d;
        }

        .placeholder-text {
            font-size: 0.85rem;
            color: #484f58;
            line-height: 1.6;
            max-width: 480px;
        }

        /* ── Mobile ── */
        @media (max-width: 600px) {
            .wiki-banner::after { display: none; }
        }
    </style>
</head>
<body>
    <div class="block-container">

        <!-- Banner -->
        <div class="wiki-banner">
            <div class="banner-eyebrow">● Documentation</div>
            <div class="banner-title">Someprototype <span>Wiki</span></div>
            <div class="banner-subtitle">
                A centralized knowledge base and FAQ for Someprototype.
            </div>
        </div>

        <!-- Back nav -->
        <a class="nav-back" href="index.html">← Back to Wiki Home</a>

        <!-- Section -->
        <div class="section-heading">Password</div>

        <!-- Placeholder content area -->
        <div class="content-placeholder">
            <div class="placeholder-label">// content coming soon</div>
            <div class="placeholder-text">
                This section is reserved for password-related documentation.<br>
                Content will be added here at a later time.
            </div>
        </div>

    </div>
</body>
</html>
